<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f4f7fc;
}

.login-container{
width:400px;
background:#fff;
padding:35px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
color:#111827;
}

input{
width:100%;
padding:12px;
margin-top:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:18px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.message{
margin-top:15px;
text-align:center;
font-size:14px;
color:red;
}

.loader{
display:none;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<div class="login-container">

<h2>Admin Login</h2>

<input
type="email"
id="email"
placeholder="Enter Email">

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="login()">
Login
</button>

<div
class="loader"
id="loader">
Please wait...
</div>

<p
id="message"
class="message">
</p>

</div>

<script>

/* ==========================
   SUPABASE CONFIG
========================== */

const supabaseUrl =
"https://ujyrevtyjygbisushowt.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqeXJldnR5anlnYmlzdXNob3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTYyNjIsImV4cCI6MjA5NjU5MjI2Mn0.ns6NTn68jBh1BCM1Khnaao1thCk40Dylibu2WGFW2KY";

const supabaseClient =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

/* ==========================
   CHECK SESSION
========================== */

async function checkSession(){

const {
data:{session}
} =
await supabaseClient
.auth
.getSession();

if(session){

window.location.href =
"dashboard.html";

}

}

checkSession();

/* ==========================
   LOGIN
========================== */

async function login(){

const email =
document
.getElementById("email")
.value
.trim();

const password =
document
.getElementById("password")
.value
.trim();

const message =
document
.getElementById("message");

const loader =
document
.getElementById("loader");

message.innerText = "";

if(!email || !password){

message.innerText =
"Enter Email and Password";

return;

}

loader.style.display =
"block";

const {error} =
await supabaseClient
.auth
.signInWithPassword({

email,
password

});

loader.style.display =
"none";

if(error){

message.innerText =
error.message;

return;

}

window.location.href =
"dashboard.html";

}

/* ==========================
   ENTER KEY LOGIN
========================== */

document
.addEventListener(
"keydown",
function(e){

if(e.key === "Enter"){

login();

}

}
);

</script>

</body>
</html>
