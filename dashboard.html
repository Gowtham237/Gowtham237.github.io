<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#f4f7fc;
display:flex;
min-height:100vh;
}

.sidebar{
width:260px;
background:#111827;
color:white;
padding:25px;
position:fixed;
height:100%;
overflow-y:auto;
}

.sidebar h2{
text-align:center;
margin-bottom:25px;
}

.sidebar button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#1f2937;
color:white;
font-size:15px;
}

.sidebar button:hover{
background:#2563eb;
}

.main{
margin-left:260px;
padding:30px;
width:100%;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:25px;
box-shadow:0 3px 15px rgba(0,0,0,.1);
}

.card h2{
margin-bottom:15px;
color:#111827;
}

input,
textarea{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

textarea{
resize:none;
}

.primary-btn{
background:#2563eb;
color:white;
border:none;
padding:12px;
margin-top:15px;
border-radius:8px;
cursor:pointer;
width:100%;
}

.primary-btn:hover{
background:#1d4ed8;
}

.edit-btn{
background:#f59e0b;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-right:5px;
}

.danger-btn{
background:#dc2626;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.skill-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin-top:10px;
background:#f8fafc;
border-radius:8px;
}

.profile-preview{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
margin-top:15px;
border:4px solid #2563eb;
}

.project-card,
.certificate-card{
background:#fff;
padding:15px;
margin-top:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.project-card img,
.certificate-card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
}

.action-buttons{
margin-top:10px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>Admin Panel</h2>

<button onclick="showSection('profileSection')">
Profile
</button>

<button onclick="showSection('aboutSection')">
About Me
</button>

<button onclick="showSection('skillsSection')">
Skills
</button>

<button onclick="showSection('projectsSection')">
Projects
</button>

<button onclick="showSection('certificatesSection')">
Certificates
</button>

<button onclick="logout()">
Logout
</button>

</div>

<div class="main">

<!-- PROFILE -->

<div class="card section" id="profileSection">

<h2>Profile Image</h2>

<input
type="file"
id="profile-input"
accept="image/*">

<button
class="primary-btn"
onclick="uploadProfileImage()">

Upload Profile Image

</button>

<img
id="profilePreview"
class="profile-preview"
src="">

</div>

<!-- ABOUT -->

<div
class="card section"
id="aboutSection"
style="display:none;">

<h2>About Me</h2>

<textarea
id="about-text"
rows="6"
placeholder="Write About Me">
</textarea>

<button
type="button"
class="primary-btn"
onclick="updateAbout()">
upload profile image



</button>

</div>

<!-- SKILLS -->

<div
class="card section"
id="skillsSection"
style="display:none;">

<h2>Skills</h2>

<input
type="text"
id="skillInput"
placeholder="Enter Skill">

<button
class="primary-btn"
onclick="addSkill()">

Add Skill

</button>

<div id="skillsList"></div>

</div>

<!-- PROJECTS -->

<div
class="card section"
id="projectsSection"
style="display:none;">

<h2>Projects</h2>

<input
type="text"
id="projectName"
placeholder="Project Name">

<textarea
id="projectDesc"
placeholder="Project Description">
</textarea>

<input
type="file"
id="projectImage"
accept="image/*">

<button
class="primary-btn"
onclick="addProject()">

Add Project

</button>

<hr style="margin:20px 0;">

<div id="projectsList"></div>

</div>

<!-- CERTIFICATES -->

<div
class="card section"
id="certificatesSection"
style="display:none;">

<h2>Certificates</h2>

<input
type="text"
id="certificateName"
placeholder="Certificate Name">

<textarea
id="certificateDesc"
placeholder="Certificate Description">
</textarea>

<input
type="file"
id="certificateImage"
accept="image/*">

<button
class="primary-btn"
onclick="addCertificate()">

Add Certificate

</button>

<hr style="margin:20px 0;">

<div id="certificatesList"></div>

</div>

</div>

<!-- Dashboard Part 2 JavaScript will come here -->

</body>
</html>
<script>

/* LOGIN CHECK */

if(!localStorage.getItem("isLoggedIn")){
window.location.href="login.html";
}

/* SUPABASE */

const supabaseUrl = "https://ujyrevtyjygbisushowt.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqeXJldnR5anlnYmlzdXNob3d0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMTYyNjIsImV4cCI6MjA5NjU5MjI2Mn0.ns6NTn68jBh1BCM1Khnaao1thCk40Dylibu2WGFW2KY";

const supabaseClient =
window.supabase.createClient(
supabaseUrl,
supabaseKey
);

/* SECTION SWITCH */

function showSection(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.style.display="none";

});

document
.getElementById(id)
.style.display="block";

}

/* LOGOUT */

function logout(){

localStorage.removeItem(
"isLoggedIn"
);

window.location.href =
"login.html";

}

/* PROFILE */

async function uploadProfileImage(){
  
try{

const file =
document.getElementById("profile-input").files[0];

if(!file){
alert("Please select an image");
return;
}

const fileName =
Date.now() + "-" + file.name;

const { data: uploadData, error: uploadError } =
await supabaseClient
.storage
.from("profile-images")
.upload(fileName, file, {
upsert: true
});

if(uploadError){
console.error(uploadError);
alert("Upload Failed: " + uploadError.message);
return;
}

const { data: publicData } =
supabaseClient
.storage
.from("profile-images")
.getPublicUrl(fileName);

const imageUrl =
publicData.publicUrl;

const { error: dbError } =
await supabaseClient
.from("about_me")
.update({
image_url: imageUrl
})
.eq("id", 1);

if(dbError){
alert("Database Error: " + dbError.message);
return;
}

loadProfile();

alert("Profile Image Uploaded Successfully");

}
catch(err){

console.error(err);

alert(
"Unexpected Error: " +
err.message
);

}

}


async function loadProfile(){

const {data} =
await supabaseClient
.from("about_me")
.select("*")
.single();

if(data){

document
.getElementById("profilePreview")
.src =
data.image_url || "";

}

}

/* ABOUT */

async function loadAbout(){

const {data} =
await supabaseClient
.from("about_me")
.select("*")
.single();

if(data){

document
.getElementById("about-text")
.value =
data.content || "";

}

}

async function updateAbout(){

const content =
document
.getElementById("about-text")
.value;

await supabaseClient
.from("about_me")
.update({
content:content
})
.eq("id",1);

alert("About Updated");

}

/* SKILLS */

async function addSkill(){

const skill =
document
.getElementById("skillInput")
.value;

if(!skill) return;

await supabaseClient
.from("skills")
.insert([
{
skill_name:skill
}
]);

document
.getElementById("skillInput")
.value="";

loadSkills();

}

async function deleteSkill(id){

await supabaseClient
.from("skills")
.delete()
.eq("id",id);

loadSkills();

}

async function editSkill(
id,
currentSkill
){

const newSkill =
prompt(
"Edit Skill",
currentSkill
);

if(!newSkill) return;

await supabaseClient
.from("skills")
.update({
skill_name:newSkill
})
.eq("id",id);

loadSkills();

}

async function loadSkills(){

const {data} =
await supabaseClient
.from("skills")
.select("*")
.order("id");

const list =
document
.getElementById("skillsList");

list.innerHTML="";

data.forEach(skill=>{

list.innerHTML += `
<div class="skill-item">

<span>${skill.skill_name}</span>

<div>

<button
class="edit-btn"
onclick="editSkill(${skill.id}, '${skill.skill_name}')">
Edit
</button>

<button
class="danger-btn"
onclick="deleteSkill(${skill.id})">
Delete
</button>

</div>

</div>
`;

});

}

/* PROJECTS */

async function addProject(){

const file =
document
.getElementById("projectImage")
.files[0];

let imageUrl="";

if(file){

const fileName =
Date.now()+"-"+file.name;

await supabaseClient
.storage
.from("project-images")
.upload(fileName,file);

const {data} =
supabaseClient
.storage
.from("project-images")
.getPublicUrl(fileName);

imageUrl =
data.publicUrl;

}

await supabaseClient
.from("projects")
.insert([
{
name:
document.getElementById("projectName").value,

description:
document.getElementById("projectDesc").value,

image_url:imageUrl
}
]);

document.getElementById("projectName").value="";
document.getElementById("projectDesc").value="";

loadProjects();

}

async function deleteProject(id){

await supabaseClient
.from("projects")
.delete()
.eq("id",id);

loadProjects();

}

async function editProject(
id,
name,
description
){

const newName =
prompt(
"Project Name",
name
);

if(!newName) return;

const newDesc =
prompt(
"Project Description",
description
);

if(!newDesc) return;

await supabaseClient
.from("projects")
.update({
name:newName,
description:newDesc
})
.eq("id",id);

loadProjects();

}

async function loadProjects(){

const {data} =
await supabaseClient
.from("projects")
.select("*")
.order(
"id",
{ascending:false}
);

const list =
document
.getElementById("projectsList");

list.innerHTML="";

data.forEach(project=>{

list.innerHTML += `
<div class="project-card">

<img
src="${project.image_url}"
alt="Project">

<h3>${project.name}</h3>

<p>${project.description}</p>

<div class="action-buttons">

<button
class="edit-btn"
onclick="editProject(
${project.id},
'${project.name}',
'${project.description}'
)">
Edit
</button>

<button
class="danger-btn"
onclick="deleteProject(${project.id})">
Delete
</button>

</div>

</div>
`;

});

}

/* CERTIFICATES */

async function addCertificate(){

const file =
document
.getElementById("certificateImage")
.files[0];

let imageUrl="";

if(file){

const fileName =
Date.now()+"-"+file.name;

await supabaseClient
.storage
.from("certificate-images")
.upload(fileName,file);

const {data} =
supabaseClient
.storage
.from("certificate-images")
.getPublicUrl(fileName);

imageUrl =
data.publicUrl;

}

await supabaseClient
.from("certificates")
.insert([
{
created_name:
document.getElementById("certificateName").value,

description:
document.getElementById("certificateDesc").value,

image_url:imageUrl
}
]);

document.getElementById("certificateName").value="";
document.getElementById("certificateDesc").value="";

loadCertificates();

}

async function deleteCertificate(id){

await supabaseClient
.from("certificates")
.delete()
.eq("id",id);

loadCertificates();

}

async function editCertificate(
id,
name,
description
){

const newName =
prompt(
"Certificate Name",
name
);

if(!newName) return;

const newDesc =
prompt(
"Certificate Description",
description
);

if(!newDesc) return;

await supabaseClient
.from("certificates")
.update({
created_name:newName,
description:newDesc
})
.eq("id",id);

loadCertificates();

}

async function loadCertificates(){

const {data} =
await supabaseClient
.from("certificates")
.select("*")
.order(
"id",
{ascending:false}
);

const list =
document
.getElementById("certificatesList");

list.innerHTML="";

data.forEach(cert=>{

list.innerHTML += `
<div class="certificate-card">

<img
src="${cert.image_url}"
alt="Certificate">

<h3>${cert.created_name}</h3>

<p>${cert.description}</p>

<div class="action-buttons">

<button
class="edit-btn"
onclick="editCertificate(
${cert.id},
'${cert.created_name}',
'${cert.description}'
)">
Edit
</button>

<button
class="danger-btn"
onclick="deleteCertificate(${cert.id})">
Delete
</button>

</div>

</div>
`;

});

}

/* INITIAL LOAD */

loadProfile();
loadAbout();
loadSkills();
loadProjects();
loadCertificates();

</script>
