<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gowtham M | Portfolio</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0a0a0a;
color:#ffffff;
line-height:1.7;
}

/* HEADER */

header{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
background:
linear-gradient(
135deg,
#000000,
#111111,
#1a1a1a
);
}

.profile-img{
width:220px;
height:220px;
border-radius:50%;
object-fit:cover;
border:4px solid #fff;
box-shadow:
0 0 40px rgba(255,255,255,.15);
margin-bottom:25px;
transition:.4s;
}

.profile-img:hover{
transform:scale(1.05);
}

header h1{
font-size:4rem;
font-weight:900;
letter-spacing:2px;
margin-bottom:10px;
}

header p{
font-size:1.2rem;
color:#cfcfcf;
max-width:700px;
}

/* NAVBAR */

nav{
position:sticky;
top:0;
z-index:1000;
background:rgba(0,0,0,.9);
backdrop-filter:blur(15px);
border-bottom:1px solid rgba(255,255,255,.08);
padding:18px;
text-align:center;
}

nav a{
color:#fff;
text-decoration:none;
margin:0 18px;
font-weight:600;
transition:.3s;
position:relative;
}

nav a::after{
content:'';
position:absolute;
left:0;
bottom:-6px;
width:0;
height:2px;
background:#fff;
transition:.3s;
}

nav a:hover::after{
width:100%;
}

/* CONTAINER */

.container{
width:90%;
max-width:1300px;
margin:auto;
padding:60px 0;
}

/* GLASS CARD */

.card{
background:#111111;
border:1px solid rgba(255,255,255,.08);
padding:35px;
margin-bottom:30px;
border-radius:24px;
box-shadow:
0 10px 30px rgba(0,0,0,.4);
transition:.4s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
font-size:2rem;
font-weight:800;
margin-bottom:20px;
color:#fff;
}

/* ABOUT */

#aboutContent{
font-size:1.05rem;
color:#d1d1d1;
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.skill{
background:#ffffff;
color:#000;
padding:12px 22px;
border-radius:50px;
font-weight:700;
font-size:14px;
transition:.3s;
}

.skill:hover{
transform:translateY(-3px);
}

/* PROJECTS */

.projects-grid,
.cert-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.project-card,
.cert-card{
background:#111;
border-radius:24px;
overflow:hidden;
border:1px solid rgba(255,255,255,.08);
transition:.4s;
}

.project-card:hover,
.cert-card:hover{
transform:translateY(-8px);
box-shadow:
0 20px 40px rgba(255,255,255,.08);
}

.project-card img,
.cert-card img{
width:100%;
height:240px;
object-fit:cover;
}

.project-content,
.cert-content{
padding:25px;
}

.project-content h3,
.cert-content h3{
font-size:1.4rem;
margin-bottom:12px;
}

.project-content p,
.cert-content p{
color:#cfcfcf;
}

/* CONTACT */

.contact p{
margin:12px 0;
font-size:1rem;
color:#d4d4d4;
}

.contact a{
color:#fff;
font-weight:700;
text-decoration:none;
}

.contact a:hover{
text-decoration:underline;
}

/* BUTTON */

.btn{
display:inline-block;
padding:14px 28px;
background:#fff;
color:#000;
font-weight:700;
border-radius:50px;
text-decoration:none;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

/* FOOTER */

footer{
padding:30px;
text-align:center;
background:#000;
border-top:1px solid rgba(255,255,255,.08);
color:#cfcfcf;
}

/* LOADER */

.loader{
text-align:center;
padding:30px;
color:#fff;
font-size:18px;
}

/* MOBILE */

@media(max-width:768px){

header h1{
font-size:2.5rem;
}

header p{
font-size:1rem;
}

.profile-img{
width:160px;
height:160px;
}

nav a{
display:block;
margin:12px 0;
}

.card{
padding:25px;
}

}

</style>
  </head>
<body>

<header>
<h1>Gowtham M</h1>
<p>2nd Year B.E Computer Science and Engineering Student</p>
</header>

</body>
</html>
